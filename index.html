<div id="sidebar">
    <div class="header">
        <img src="logo-locli.png" alt="LOCLI" style="width: 100px;">
        <h3>Configurateur 3D</h3>
    </div>

    <div class="step">
        <label>1. Type de Module</label>
        <select id="moduleType">
            <option value="standard">Bungalow Chantier</option>
            <option value="re2020">Module RE2020</option>
        </select>
    </div>

    <div class="step">
        <label>2. Longueur (m)</label>
        <div class="range-group">
            <input type="range" min="3" max="12" value="6" step="3">
            <span>6m</span>
        </div>
    </div>

    <div class="step">
        <label>3. Personnalisation</label>
        <div class="btn-grid">
            <button onclick="changeColor(0x34495e)" style="background:#34495e;"></button>
            <button onclick="changeColor(0xecf0f1)" style="background:#ecf0f1;"></button>
            <button onclick="changeColor(0x27ae60)" style="background:#27ae60;"></button>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="clim" onchange="toggleOption('Clim')"> Climatisation
        </div>
    </div>

    <div class="footer-sidebar">
        <button class="quote-btn">Demander un devis</button>
    </div>
</div>
