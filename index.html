<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur 3D - LOCLI Nîmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <h1>Configurateur Module LOCLI</h1>
        <p>Utilisez la souris pour pivoter (clic gauche) et zoomer (molette).</p>
        <div class="controls">
            <button onclick="changeColor(0x2c3e50)">Gris Anthracite</button>
            <button onclick="changeColor(0xffffff)">Blanc Pur</button>
            <button onclick="changeColor(0x27ae60)">Vert Éco</button>
            <hr>
            <button onclick="toggleVisibility('Toit')">Afficher/Masquer Toit</button>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
