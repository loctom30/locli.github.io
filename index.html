<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCLI - Configurateur 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <div class="header">
            <h2>LOCLI 3D</h2>
            <p>Nîmes • Modulaire</p>
        </div>

        <div class="config-section">
            <label>Dimensions du module</label>
            <select id="sizeSelector">
                <option value="1">Standard (6m)</option>
                <option value="1.5">Grand (9m)</option>
                <option value="0.5">Petit (3m)</option>
            </select>
        </div>

        <div class="config-section">
            <label>Couleur Extérieure</label>
            <div class="color-grid">
                <button class="color-btn" style="background:#2c3e50" onclick="changeColor(0x2c3e50)"></button>
                <button class="color-btn" style="background:#ecf0f1" onclick="changeColor(0xecf0f1)"></button>
                <button class="color-btn" style="background:#27ae60" onclick="changeColor(0x27ae60)"></button>
                <button class="color-btn" style="background:#2980b9" onclick="changeColor(0x2980b9)"></button>
            </div>
        </div>

        <div class="config-section">
            <label>Options</label>
            <div class="option-item">
                <input type="checkbox" id="checkToit" onchange="toggleOption('Toit')">
                <span>Masquer le toit</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="checkClim" onchange="toggleOption('Clim')">
                <span>Unité Climatisation</span>
            </div>
        </div>

        <button class="cta-button" onclick="alert('Demande envoyée pour ce module !')">OBTENIR UN DEVIS</button>
    </div>

    <div id="container3d"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
